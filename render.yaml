services:
  - type: web
    name: cylin-painters
    env: node
    branch: main
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3000"
      - key: MONGODB_URI
        value: "mongodb+srv://<DB_USER>:<DB_PASSWORD>@cluster0.8fml9ow.mongodb.net/cylin-painters?retryWrites=true&w=majority"
      - key: SESSION_SECRET
        value: "your-secret-key-here"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        value: "your-secure-password"
      - key: EMAIL_USER
        value: "your-email@gmail.com"
      - key: EMAIL_PASS
        value: "your-app-password"
