services:
  - type: web
    name: cylin-painters
    env: node
    branch: master
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: MONGODB_URI
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: "cylin-painters"
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Cylin Painters"
      - key: EMAIL_SERVICE
        value: "gmail"
      - key: APP_URL
        value: "https://cylin-painters.onrender.com"
      - key: CORS_ORIGIN
        value: "*"


