<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Cylin Painters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo"><i class="fas fa-paint-roller"></i> Cylin Painters</a>
      <div class="nav-menu nav-menu-inline">
        <a href="/products" class="nav-link">Products</a>
        <a href="/login" class="nav-link">Login</a>
        <a href="/register" class="nav-link">Register</a>
      </div>
    </div>
  </nav>

  <main class="checkout-page">
    <section class="container checkout-grid">
      <div class="checkout-summary">
        <h1>Order Summary</h1>
        <div id="checkoutItems"></div>
        <div class="checkout-total">
          <span>Subtotal</span>
          <strong id="checkoutSubtotal">$0.00</strong>
        </div>
        <div id="checkoutEmpty" class="empty-state" style="display:none; margin-top: 1rem;">
          <i class="fas fa-box-open"></i>
          <p>Your cart is empty. Add products from the store to continue.</p>
        </div>
      </div>

      <div class="checkout-form-card">
        <h2>Shipping & Billing</h2>
        <form id="checkoutForm">
          <div class="form-group"><label>Name</label><input type="text" id="customerName" required></div>
          <div class="form-group"><label>Email</label><input type="email" id="customerEmail" required></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="customerPhone"></div>
          <div class="form-group"><label>Address</label><textarea id="customerAddress" rows="4" required></textarea></div>
          <button type="submit" class="btn btn-primary btn-full">Place Order</button>
        </form>
        <div id="checkoutMessage" class="form-message"></div>
      </div>
    </section>
  </main>

  <script src="js/cart.js" type="module"></script>
  <script src="js/checkout.js" type="module"></script>
</body>
</html>
